<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Control de Limpieza</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <header>
        <h1>Control de Limpieza</h1>
        <p class="tagline">Seguimiento de tareas de limpieza</p>
        <nav class="main-nav">
            <ul>
                <li><a href="index.html">Inventario</a></li>
                <li class="active"><a href="limpieza.html">Control de Limpieza</a></li>
            </ul>
        </nav>
    </header>
    
    <div class="container">
        <section class="form-section">
            <div class="card">
                <h2>Registrar Tarea de Limpieza</h2>
                <form id="limpieza-form">
                    <div class="input-group">
                        <label for="limpieza-nombre">Nombre del artículo o área</label>
                        <input type="text" id="limpieza-nombre" required>
                    </div>
                    
                    <div class="input-group">
                        <label for="limpieza-frecuencia">Frecuencia de limpieza (días)</label>
                        <input type="number" id="limpieza-frecuencia" min="1" value="7" required>
                    </div>

                    <div class="input-group">
                        <label for="limpieza-ultima">Última limpieza</label>
                        <input type="date" id="limpieza-ultima">
                    </div>
                    
                    <div class="input-group">
                        <label for="limpieza-notas">Instrucciones o notas</label>
                        <textarea id="limpieza-notas"></textarea>
                    </div>
                    
                    <button type="submit" class="btn btn-primary">Registrar</button>
                </form>
            </div>
        </section>
        
        <section class="limpieza-section">
            <div class="card">
                <div class="card-header">
                    <h2>Tareas de Limpieza</h2>
                    <div class="filter-controls">
                        <input type="text" id="limpieza-search" placeholder="Buscar tareas...">
                    </div>
                </div>
                
                <div id="limpieza-list" class="limpieza-list">
                    <!-- Los items se agregarán dinámicamente aquí -->
                </div>

                <div id="empty-limpieza" class="empty-state">
                    <p>No hay tareas de limpieza registradas</p>
                    <p>Agrega tareas usando el formulario</p>
                </div>
            </div>
        </section>
    </div>

    <!-- Modal para editar tareas de limpieza -->
    <div id="limpieza-edit-modal" class="modal">
        <div class="modal-content">
            <span class="limpieza-close-btn close-btn">&times;</span>
            <h2>Editar Tarea de Limpieza</h2>
            <form id="limpieza-edit-form">
                <input type="hidden" id="limpieza-edit-id">
                
                <div class="input-group">
                    <label for="limpieza-edit-nombre">Nombre del artículo o área</label>
                    <input type="text" id="limpieza-edit-nombre" required>
                </div>
                
                <div class="input-group">
                    <label for="limpieza-edit-frecuencia">Frecuencia de limpieza (días)</label>
                    <input type="number" id="limpieza-edit-frecuencia" min="1" required>
                </div>
                
                <div class="input-group">
                    <label for="limpieza-edit-ultima">Última limpieza</label>
                    <input type="date" id="limpieza-edit-ultima">
                </div>
                
                <div class="input-group">
                    <label for="limpieza-edit-notas">Instrucciones o notas</label>
                    <textarea id="limpieza-edit-notas"></textarea>
                </div>
                
                <button type="submit" class="btn btn-primary">Guardar Cambios</button>
            </form>
        </div>
    </div>

    <!-- Incorporar el script de limpieza -->
    <script src="js/limpieza.js"></script>
    
    <!-- Enlace de exportación a GitHub -->
    <footer>
        <div class="container">
            <p>
                <a href="https://github.com/tu-usuario-github/inventario-aseo" target="_blank" class="github-link">
                    Ver en GitHub
                </a>
            </p>
        </div>
    </footer>
</body>
</html>
